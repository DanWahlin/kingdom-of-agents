<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; connect-src 'self' blob:;">
  <title>Copilot Mission Control</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0e22;
      overflow: hidden;
      cursor: default;
      color: #e8ecff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', sans-serif;
    }
    body.theme-light, body.theme-light html { background: #f4f7fb; color: #1f2937; }

    /* Top navigation bar — app brand, live metrics, and right-aligned
       controls. Operational detail lives in the dashboard panels so the
       bar stays quiet while users work in Copilot. */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      background:
        linear-gradient(180deg, #1d2a55 0%, #131b39 60%, #0d1430 100%);
      border-bottom: 2px solid #ffd54a;
      box-shadow:
        0 1px 0 rgba(255, 213, 74, 0.25) inset,
        0 6px 14px rgba(0, 0, 0, 0.55);
      font-size: 13px;
      letter-spacing: 0.06em;
      user-select: none;
      -webkit-user-select: none;
      z-index: 10;
    }
    body.theme-light #topbar {
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border-bottom: 1px solid #cbd5e1;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 6px 18px rgba(15, 23, 42, 0.08);
    }
    #topbar .brand {
      display: inline-flex;
      align-items: center;
      color: #ffd54a;
      font-weight: 700;
      text-transform: uppercase;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      white-space: nowrap;
    }
    body.theme-light #topbar .brand {
      color: #1e3a5f;
      text-shadow: none;
    }
    #topbar-metrics {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 1 auto;
      min-width: 0;
      overflow: hidden;
    }
    .topbar-metric {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      max-width: 150px;
      padding: 4px 9px;
      border: 1px solid rgba(127, 151, 239, 0.36);
      border-radius: 999px;
      background: rgba(16, 24, 51, 0.72);
      color: #e8ecff;
      white-space: nowrap;
    }
    .topbar-metric-label {
      color: #93a4d8;
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .topbar-metric-value {
      color: var(--metric-color, #ffd54a);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    body.theme-light .topbar-metric {
      background: #f8fafc;
      border-color: #cbd5e1;
      color: #334155;
    }
    body.theme-light .topbar-metric-label { color: #64748b; }
    #topbar-controls {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    #topbar button {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #e8ecff;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    #topbar button:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 213, 74, 0.5);
    }
    body.theme-light #topbar button {
      border-color: #cbd5e1;
      color: #334155;
    }
    body.theme-light #topbar button:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }
    /* Panels-toggle button — collapse/expand side panels for a focused
       mission-only view. Sits left of the theme button. Uses inline SVG
       so the icon stays crisp in both themes and morphs between the
       "hide" (inward arrows) and "show" (outward arrows) states. */
    #panels-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 28px;
      padding: 0;
    }
    #panels-btn svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #panels-btn svg .pupil {
      fill: currentColor;
      stroke: none;
    }
    /* Theme toggle button — the icon shows the *target* theme (moon in
       light mode → click to go dark; sun in dark mode → click to go
       light). The button bg mirrors that target so the button reads as
       a preview of where you'll end up. */
    #theme-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 28px;
      padding: 0;
      background: linear-gradient(180deg, #f6f8fd 0%, #e1e7f3 100%);
      border-color: rgba(15, 30, 70, 0.18);
      color: #1a2240;
    }
    #theme-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #eaeff8 100%);
      border-color: rgba(138, 93, 0, 0.6);
    }
    body.theme-light #theme-btn {
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      border-color: #334155;
      color: #f8fafc;
    }
    body.theme-light #theme-btn:hover {
      background: linear-gradient(180deg, #334155 0%, #111827 100%);
      border-color: #475569;
    }

    /* Active model chip — shows the model id (e.g. "gpt-5.5") for the
       currently-inspected session. Hidden until the scene reports a
       model so we never flash an empty pill on load. */
    #model-chip {
      flex: 0 1 auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: lowercase;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(255, 213, 74, 0.12);
      color: #ffd54a;
      border: 1px solid rgba(255, 213, 74, 0.4);
      white-space: nowrap;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #model-chip.empty { display: none; }
    body.theme-light #model-chip {
      background: #f8fafc;
      color: #334155;
      border-color: #cbd5e1;
    }
    @media (max-width: 1280px) {
      #topbar {
        gap: 8px;
        padding: 0 10px;
        font-size: 12px;
      }
      #topbar .brand { max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
      .topbar-metric { max-width: 118px; padding: 4px 7px; gap: 4px; }
      #model-chip { max-width: 170px; }
    }
    @media (max-width: 1040px) {
      #model-chip { max-width: 120px; }
      .topbar-metric { max-width: 104px; }
    }

    /* HTML inspector overlay. Phaser still owns the mission map; this
       dialog uses native DOM controls for the high-density drill-down so
       scrolling, wrapping, selection, and keyboard close behave like a
       normal desktop UI. */
    #inspector-overlay {
      position: fixed;
      inset: 40px 0 0 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: rgba(0, 0, 0, 0.58);
      box-sizing: border-box;
    }
    #inspector-overlay.visible { display: flex; }
    #inspector-dialog {
      width: min(1120px, calc(100vw - 56px));
      height: min(700px, calc(100vh - 96px));
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
      background: #0c1430;
      color: #e8ecff;
      border: 2px solid #ffd54a;
      border-radius: 16px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.62);
      padding: 20px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    body.theme-light #inspector-dialog {
      background: #ffffff;
      color: #1f2937;
      border-color: #cbd5e1;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
    }
    .inspector-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
    }
    .inspector-title {
      margin: 0 0 6px 0;
      color: #ffd54a;
      font-size: 18px;
      letter-spacing: 0.02em;
    }
    body.theme-light .inspector-title { color: #1e3a5f; }
    .inspector-subtitle {
      color: #93a4d8;
      font-size: 12px;
      line-height: 1.5;
    }
    body.theme-light .inspector-subtitle { color: #64748b; }
    .inspector-close {
      width: 34px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(255, 122, 122, 0.8);
      background: #1a2448;
      color: #ff8a8a;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    body.theme-light .inspector-close {
      background: #fff4f4;
      color: #a01818;
      border-color: rgba(160, 24, 24, 0.55);
    }
    .inspector-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .inspector-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-left: 12px;
    }
    .inspector-pill {
      border: 1px solid #4566c7;
      background: #121b3b;
      color: #cbd6ff;
      border-radius: 10px;
      padding: 8px 14px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .inspector-pill.active {
      border-color: #ffd54a;
      color: #ffd54a;
      background: #25346c;
      box-shadow: inset 0 0 0 1px rgba(255, 213, 74, 0.35);
    }
    body.theme-light .inspector-pill {
      background: #f8fafc;
      color: #334155;
      border-color: #cbd5e1;
    }
    body.theme-light .inspector-pill.active {
      background: #e0ecff;
      color: #1d4ed8;
      border-color: #93c5fd;
    }
    .inspector-body {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(360px, 0.95fr);
      gap: 18px;
    }
    .inspector-list,
    .inspector-detail {
      min-height: 0;
      overflow: auto;
      scrollbar-gutter: stable;
      scrollbar-width: auto;
      scrollbar-color: #7f97ef #07102b;
      border: 1px solid #31437a;
      border-radius: 12px;
      background: rgba(16, 24, 51, 0.88);
      padding: 12px;
      box-sizing: border-box;
    }
    body.theme-light .inspector-list,
    body.theme-light .inspector-detail {
      background: #f7f9fd;
      border-color: #d6dee9;
      scrollbar-color: #6f83cc #e0e6f3;
    }
    .inspector-row {
      width: 100%;
      text-align: left;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      border: 1px solid rgba(127, 151, 239, 0.34);
      border-radius: 10px;
      background: rgba(97, 214, 255, 0.10);
      color: inherit;
      padding: 12px;
      margin: 0 0 10px 0;
      cursor: pointer;
      font: inherit;
    }
    .inspector-row.active {
      border-color: #ffd54a;
      background: rgba(255, 213, 74, 0.16);
    }
    .inspector-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-top: 4px;
      background: #61d6ff;
    }
    .inspector-row.failed .inspector-dot { background: #ff5252; }
    .inspector-row-main {
      min-width: 0;
    }
    .inspector-row-title {
      display: block;
      font-weight: 700;
      color: #f5f7ff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    body.theme-light .inspector-row-title { color: #1f2937; }
    .inspector-row-sub,
    .inspector-row-meta,
    .inspector-empty {
      color: #93a4d8;
      font-size: 12px;
      line-height: 1.5;
    }
    body.theme-light .inspector-row-sub,
    body.theme-light .inspector-row-meta,
    body.theme-light .inspector-empty { color: #64748b; }
    .inspector-row-meta {
      white-space: nowrap;
      text-align: right;
    }
    .inspector-detail h3 {
      margin: 0 0 14px 0;
      color: #ffd54a;
      font-size: 16px;
    }
    body.theme-light .inspector-detail h3 { color: #1e3a5f; }
    .inspector-kv {
      display: grid;
      grid-template-columns: minmax(90px, 130px) 1fr;
      gap: 8px 14px;
      margin-bottom: 18px;
      font-size: 13px;
      line-height: 1.55;
    }
    .inspector-kv dt {
      color: #93a4d8;
    }
    .inspector-kv dd {
      margin: 0;
      overflow-wrap: anywhere;
    }
    body.theme-light .inspector-kv dt { color: #64748b; }
    .inspector-related-title {
      color: #ffd54a;
      font-weight: 700;
      margin: 18px 0 10px;
    }
    body.theme-light .inspector-related-title { color: #1e3a5f; }
    .inspector-related {
      display: grid;
      gap: 8px;
    }
    .inspector-related-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(96, 255, 154, 0.12);
      border: 1px solid rgba(96, 255, 154, 0.22);
      font-size: 12px;
    }
    .inspector-related-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }
    .inspector-related-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }
    .inspector-related-sub {
      color: #93a4d8;
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .inspector-related-meta {
      flex: 0 0 auto;
      color: #93a4d8;
      font-size: 11px;
      line-height: 1.35;
      text-align: right;
      white-space: nowrap;
    }
    body.theme-light .inspector-related-sub,
    body.theme-light .inspector-related-meta { color: #64748b; }
    .inspector-related-item.failed {
      background: rgba(255, 82, 82, 0.12);
      border-color: rgba(255, 82, 82, 0.25);
    }
    @media (max-width: 900px) {
      #inspector-dialog { height: min(760px, calc(100vh - 80px)); }
      .inspector-body { grid-template-columns: 1fr; }
    }

    /* The Phaser canvas mounts inside #game and fills the area below
       the top bar. Tauri's window-state plugin restores window size on
       launch; Phaser scales to whatever the viewport ends up being. */
    #game {
      position: fixed;
      top: 40px;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0a0e22;
    }
    body.theme-light #game { background: #f4f7fb; }
    canvas { display: block; }
    #dashboard-overlay {
      position: fixed;
      top: 40px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      pointer-events: none;
      font-family: '"Press Start 2P"', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .dashboard-loading {
      position: fixed;
      inset: 40px 0 0 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 50% 45%, rgba(13, 97, 245, 0.24), transparent 36%),
        #05081a;
      transition: opacity 0.18s ease, visibility 0.18s ease;
    }
    .dashboard-loading-card {
      width: min(980px, 82vw);
      border: 2px solid rgba(255, 213, 74, 0.42);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(5, 8, 26, 0.82);
      box-shadow:
        0 0 0 1px rgba(97, 214, 255, 0.22) inset,
        0 28px 90px rgba(0, 0, 0, 0.56);
    }
    .dashboard-loading-card img {
      display: block;
      width: 100%;
      height: auto;
    }
    .dashboard-loading-caption {
      padding: 14px 18px;
      color: #ffd54a;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-align: center;
      text-transform: uppercase;
      background: linear-gradient(180deg, rgba(37, 52, 108, 0.88), rgba(16, 24, 51, 0.92));
    }
    body.theme-light .dashboard-loading {
      background:
        radial-gradient(circle at 50% 45%, rgba(13, 97, 245, 0.14), transparent 36%),
        #f4f7fb;
    }
    body.theme-light .dashboard-loading-card {
      background: rgba(255, 255, 255, 0.92);
      border-color: rgba(13, 97, 245, 0.25);
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.18);
    }
    body.theme-light .dashboard-loading-caption {
      color: #1e3a5f;
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.96), rgba(238, 242, 247, 0.96));
    }
    body.dashboard-ready .dashboard-loading {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    body:not(.dashboard-ready) #dashboard-overlay .cmc-panel {
      display: none;
    }
    .cmc-panel {
      position: absolute;
      pointer-events: auto;
      box-sizing: border-box;
      background: linear-gradient(180deg, rgba(16, 26, 58, 0.94), rgba(10, 16, 36, 0.94));
      border: 2px solid rgba(28, 39, 80, 0.9);
      border-radius: 16px;
      box-shadow: 6px 7px 0 rgba(2, 7, 19, 0.52);
      color: #e8ecff;
      padding: 48px 20px 16px;
      overflow: hidden;
    }
    #dom-session {
      padding-bottom: 16px;
    }
    body.theme-light .cmc-panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.98));
      border-color: #d6dee9;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      color: #1f2937;
    }
    .cmc-panel.hidden { display: none; }
    .cmc-panel-body {
      height: 100%;
      min-height: 0;
      box-sizing: border-box;
    }
    .cmc-panel-title {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      box-sizing: border-box;
      border-radius: 14px 14px 0 0;
      background: linear-gradient(180deg, #25346c, #1a2448);
      color: #ffd54a;
      font-size: 14px;
    }
    body.theme-light .cmc-panel-title {
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color: #1e3a5f;
      border: 1px solid #cbd5e1;
    }
    .cmc-label, .cmc-muted { color: #93a4d8; }
    body.theme-light .cmc-label, body.theme-light .cmc-muted { color: #64748b; }
    .cmc-label { font-size: 12px; line-height: 1.4; }
    #dom-workmix .cmc-panel-body {
      overflow: hidden;
    }
    .cmc-workmix { min-height: 0; margin-top: 0; }
    .cmc-workmix-controls {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 10px;
    }
    .cmc-select {
      min-width: 0;
      height: 28px;
      border-radius: 7px;
      border: 1px solid rgba(127, 151, 239, 0.48);
      background: rgba(16, 24, 51, 0.92);
      color: #e8ecff;
      padding: 0 8px;
      font: inherit;
      font-size: 10px;
    }
    body.theme-light .cmc-select {
      background: #ffffff;
      color: #1f2937;
      border-color: #cbd5e1;
    }
    .cmc-workmix-title { font-size: 12px; margin-bottom: 6px; color: #93a4d8; }
    .cmc-work-row {
      display: grid;
      grid-template-columns: 58px 1fr 34px;
      gap: 10px;
      align-items: center;
      margin: 3px 0;
      font-size: 11px;
      line-height: 1.1;
    }
    .cmc-bar { height: 10px; border-radius: 999px; background: #1a2448; overflow: hidden; }
    .cmc-bar span { display: block; height: 100%; min-width: 12px; border-radius: 999px; background: var(--bar-color, #61d6ff); }
    .cmc-feed-row {
      width: 100%;
      border: 1px solid rgba(127, 151, 239, 0.44);
      border-radius: 8px;
      background: rgba(16, 24, 51, 0.82);
      color: inherit;
      padding: 6px 8px;
      box-sizing: border-box;
      font: inherit;
      text-align: left;
    }
    body.theme-light .cmc-feed-row {
      background: #ffffff;
      border-color: #d6dee9;
    }
    .cmc-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--dot, #60ff9a); }
    .cmc-session-picker { margin-bottom: 8px; }
    .cmc-session-picker .cmc-select { width: 100%; }
    .cmc-session-summary {
      display: grid;
      gap: 8px;
      padding: 10px 12px;
      margin: 8px 0;
      border: 1px solid rgba(96, 255, 154, 0.58);
      border-radius: 12px;
      background:
        radial-gradient(circle at 18px 16px, rgba(96, 255, 154, 0.22), transparent 52px),
        linear-gradient(180deg, rgba(34, 156, 78, 0.24), rgba(16, 24, 51, 0.74));
      box-shadow:
        inset 0 0 0 1px rgba(96, 255, 154, 0.12),
        0 0 18px rgba(96, 255, 154, 0.08);
    }
    body.theme-light .cmc-session-summary {
      background:
        radial-gradient(circle at 18px 16px, rgba(34, 197, 94, 0.18), transparent 52px),
        linear-gradient(180deg, #ecfdf5, #ffffff);
      border-color: #86efac;
      box-shadow: 0 8px 20px rgba(22, 163, 74, 0.1);
    }
    .cmc-session-heading {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .cmc-session-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      color: #f5f7ff;
    }
    body.theme-light .cmc-session-title { color: #1f2937; }
    .cmc-meta-pill {
      border: 1px solid rgba(127, 151, 239, 0.36);
      border-radius: 999px;
      padding: 4px 7px;
      white-space: nowrap;
      background: rgba(2, 7, 19, 0.28);
    }
    .cmc-session-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 10px;
      line-height: 1.25;
    }
    body.theme-light .cmc-meta-pill {
      background: #f8fafc;
      border-color: #cbd5e1;
    }
    .cmc-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
    .cmc-button {
      border: 1px solid rgba(165, 177, 216, 0.7);
      background: #1a2448;
      color: #a5b1d8;
      border-radius: 6px;
      padding: 8px 12px;
      font: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    .cmc-button.accent { color: #61d6ff; border-color: rgba(97, 214, 255, 0.7); }
    .cmc-button.disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }
    body.theme-light .cmc-button {
      background: #f8fafc;
      color: #334155;
      border-color: #cbd5e1;
    }
    body.theme-light .cmc-button.accent {
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #93c5fd;
    }
    #dom-feed .cmc-panel-body {
      overflow-y: auto;
      scrollbar-gutter: stable;
      padding-right: 8px;
      padding-bottom: 10px;
    }
    #dom-session .cmc-panel-body {
      overflow-y: hidden;
    }
    @media (max-height: 820px) {
      #dom-session .cmc-panel-body {
        overflow-y: auto;
        scrollbar-gutter: stable;
        padding-right: 8px;
      }
    }
    .cmc-feed-list { display: grid; gap: 8px; padding-bottom: 10px; }
    .cmc-feed-row { display: grid; grid-template-columns: 12px 1fr auto; gap: 10px; align-items: center; font-size: 11px; min-height: 26px; }
    #dom-quarter .cmc-panel-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-bottom: 16px;
      overflow-y: auto;
      scrollbar-gutter: stable;
      padding-right: 8px;
    }
    .inspector-list,
    .inspector-detail,
    #dom-session .cmc-panel-body,
    #dom-feed .cmc-panel-body,
    #dom-quarter .cmc-panel-body {
      scrollbar-width: auto;
      scrollbar-color: #9fb0ff #07102b;
    }
    .inspector-list::-webkit-scrollbar,
    .inspector-detail::-webkit-scrollbar,
    #dom-session .cmc-panel-body::-webkit-scrollbar,
    #dom-feed .cmc-panel-body::-webkit-scrollbar,
    #dom-quarter .cmc-panel-body::-webkit-scrollbar {
      width: 16px;
      height: 16px;
    }
    .inspector-list::-webkit-scrollbar-track,
    .inspector-detail::-webkit-scrollbar-track,
    #dom-session .cmc-panel-body::-webkit-scrollbar-track,
    #dom-feed .cmc-panel-body::-webkit-scrollbar-track,
    #dom-quarter .cmc-panel-body::-webkit-scrollbar-track {
      background: #07102b;
      border-left: 1px solid #31437a;
      border-radius: 10px;
    }
    .inspector-list::-webkit-scrollbar-thumb,
    .inspector-detail::-webkit-scrollbar-thumb,
    #dom-session .cmc-panel-body::-webkit-scrollbar-thumb,
    #dom-feed .cmc-panel-body::-webkit-scrollbar-thumb,
    #dom-quarter .cmc-panel-body::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #c3ceff 0%, #7f97ef 100%);
      border: 3px solid #07102b;
      border-radius: 999px;
      min-height: 44px;
    }
    .inspector-list::-webkit-scrollbar-thumb:hover,
    .inspector-detail::-webkit-scrollbar-thumb:hover,
    #dom-session .cmc-panel-body::-webkit-scrollbar-thumb:hover,
    #dom-feed .cmc-panel-body::-webkit-scrollbar-thumb:hover,
    #dom-quarter .cmc-panel-body::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #e0e6ff 0%, #9fb0ff 100%);
    }
    body.theme-light .inspector-list,
    body.theme-light .inspector-detail,
    body.theme-light #dom-session .cmc-panel-body,
    body.theme-light #dom-feed .cmc-panel-body,
    body.theme-light #dom-quarter .cmc-panel-body {
      scrollbar-color: #6f83cc #e0e6f3;
    }
    body.theme-light .inspector-list::-webkit-scrollbar-track,
    body.theme-light .inspector-detail::-webkit-scrollbar-track,
    body.theme-light #dom-session .cmc-panel-body::-webkit-scrollbar-track,
    body.theme-light #dom-feed .cmc-panel-body::-webkit-scrollbar-track,
    body.theme-light #dom-quarter .cmc-panel-body::-webkit-scrollbar-track {
      background: #e0e6f3;
      border-left-color: #d6dee9;
    }
    body.theme-light .inspector-list::-webkit-scrollbar-thumb,
    body.theme-light .inspector-detail::-webkit-scrollbar-thumb,
    body.theme-light #dom-session .cmc-panel-body::-webkit-scrollbar-thumb,
    body.theme-light #dom-feed .cmc-panel-body::-webkit-scrollbar-thumb,
    body.theme-light #dom-quarter .cmc-panel-body::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #8ca0e6 0%, #5f73bd 100%);
      border-color: #e0e6f3;
    }
    .cmc-quarter-line { font-size: 12px; line-height: 1.55; margin: 0; }
    .cmc-quarter-tools { font-size: 11px; line-height: 1.45; margin-top: 2px; }
    .cmc-quarter-footer { margin-top: auto; font-size: 11px; line-height: 1.4; }
    .cmc-footer-alert { color: #ff8a8a; }
    .cmc-footer-info { color: #7f97ef; }
    #dom-quarter {
      border-color: color-mix(in srgb, var(--quarter-color, #ffd54a) 60%, rgba(28, 39, 80, 0.9));
      box-shadow:
        0 -1px 0 color-mix(in srgb, var(--quarter-color, #ffd54a) 55%, transparent) inset,
        6px 7px 0 rgba(2, 7, 19, 0.52);
    }
    #dom-quarter .cmc-panel-title {
      color: var(--quarter-color, #ffd54a);
      border-bottom: 1px solid color-mix(in srgb, var(--quarter-color, #ffd54a) 45%, transparent);
    }
    body.theme-light #dom-quarter {
      border-color: color-mix(in srgb, var(--quarter-color, #1d4ed8) 44%, #d6dee9);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }
    #dom-replay { padding: 0; }
    .cmc-replay-inner {
      height: 100%;
      display: grid;
      grid-template-columns: 38px 1fr 86px;
      gap: 14px;
      align-items: center;
      padding: 8px 14px;
      box-sizing: border-box;
    }
    .cmc-replay-track { position: relative; height: 22px; cursor: pointer; outline: none; }
    .cmc-replay-track:focus-visible { box-shadow: 0 0 0 2px #ffd54a; border-radius: 8px; }
    .cmc-replay-rail { position: absolute; left: 0; right: 0; top: 6px; height: 10px; border-radius: 999px; background: #1a2448; overflow: hidden; }
    .cmc-replay-fill { height: 100%; border-radius: 999px; background: #60ff9a; width: 0%; }
    .cmc-replay-knob { position: absolute; top: -1px; width: 8px; height: 24px; background: #60ff9a; transform: translateX(-4px); }
    .cmc-replay-status { position: absolute; left: 0; bottom: -10px; font-size: 9px; color: #60ff9a; }
    body.theme-light .cmc-replay-rail { background: #dbe4ef; }
    body.theme-light .cmc-replay-fill,
    body.theme-light .cmc-replay-knob { background: #2563eb; }
    body.theme-light .cmc-replay-status { color: #1d4ed8; }
  </style>
</head>
<body>
  <div id="topbar">
    <span class="brand">Copilot Mission Control</span>
    <span id="topbar-metrics" aria-label="Live session metrics"></span>
    <span id="topbar-controls">
      <span id="model-chip" class="empty" title="Active model for the selected session"></span>
      <button id="panels-btn" type="button" title="Hide side panels for focus mode" aria-label="Hide side panels for focus mode"></button>
      <button id="theme-btn" type="button" title="Toggle light/dark theme" aria-label="Switch to light theme">🌙</button>
    </span>
  </div>

  <div id="game"></div>
  <div id="dashboard-loading" class="dashboard-loading" role="status" aria-live="polite">
    <div class="dashboard-loading-card">
      <img src="../docs/img/copilot-mission-control.webp" alt="Copilot Mission Control dashboard preview">
      <div class="dashboard-loading-caption">Initializing mission control…</div>
    </div>
  </div>
  <div id="dashboard-overlay" aria-label="Mission Control dashboard">
    <section id="dom-session" class="cmc-panel"><div class="cmc-panel-title">Selected Session</div><div class="cmc-panel-body"></div></section>
    <section id="dom-workmix" class="cmc-panel"><div class="cmc-panel-title">Activity Mix</div><div class="cmc-panel-body"></div></section>
    <section id="dom-feed" class="cmc-panel"><div class="cmc-panel-title">Recent Activity Feed</div><div class="cmc-panel-body"></div></section>
    <section id="dom-quarter" class="cmc-panel" aria-live="polite"><div class="cmc-panel-title">Sector</div><div class="cmc-panel-body"></div></section>
    <section id="dom-replay" class="cmc-panel"></section>
  </div>

  <section id="inspector-overlay" aria-hidden="true">
    <div id="inspector-dialog" role="dialog" aria-modal="true" aria-labelledby="inspector-title" tabindex="-1">
      <div class="inspector-header">
        <div>
          <h2 id="inspector-title" class="inspector-title">Inspector</h2>
          <div id="inspector-subtitle" class="inspector-subtitle"></div>
        </div>
        <button id="inspector-close" class="inspector-close" type="button" aria-label="Close inspector">×</button>
      </div>
      <div class="inspector-toolbar">
        <button class="inspector-pill active" type="button" data-inspector-mode="tools" aria-pressed="true">Tools</button>
        <button class="inspector-pill" type="button" data-inspector-mode="turns" aria-pressed="false">Turns</button>
        <div id="inspector-tabs" class="inspector-tabs" aria-label="Tool filters"></div>
      </div>
      <div class="inspector-body">
        <div id="inspector-list" class="inspector-list" tabindex="0"></div>
        <div id="inspector-detail" class="inspector-detail"></div>
      </div>
    </div>
  </section>

  <script src="./hud.js"></script>
  <script src="./phaser.min.js"></script>
  <script type="module" src="./game.js"></script>
</body>
</html>
