name: ✨ Feature Request
description: Suggest a new feature, quarter, or improvement for Kingdom of Agents
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve, or what's missing from the dashboard today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Kingdom of Agents to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered (optional).

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mock-ups, links, related issues, or anything else that would help.
